services:
  node-exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node-exporter

    user: 2001:2001
    cap_drop:
      - ALL
    cap_add:
      - CAP_NET_BIND_SERVICE
    read_only: true
    
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring_net
    ports: 
      - 9100:9100    

  # cadvisor:
