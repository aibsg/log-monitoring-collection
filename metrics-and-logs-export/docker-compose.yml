  #   restart: unless-stopped
    
  
  vector-agent:
    image: timberio/vector:0.51.1-alpine
    container_name: vector-agent

    user: 2002:2002
    cap_drop:
      - ALL

    env_file:
      - .env
    volumes:
      - ${VECTOR_CONFIG_FILE}:/etc/vector/vector.yml:ro
      - ${PM2_LOGS_DIR}:/var/log/pm2:ro
      - ${NGINX_LOGS_DIR}:/var/log/nginx:ro
      - ${MYSQL_LOGS_DIR}:/var/log/mysql:ro
      - /logs_out:/logs_out #Должна быть создана на хосте где владелец 2002
    networks:
      - logs_net
    

networks:
  monitoring_net:
  logs_net:
  
