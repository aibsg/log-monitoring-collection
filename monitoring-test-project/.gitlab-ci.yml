stages: 
  - build
  - push
  - deploy           

before_script:
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

build:
  image: docker:cli
  stage: build
  script:
    - docker-compose --env-file /dev/null -f docker-compose.prod.yml build
  tags:
    - docker-exe 

push:
  stage: push
  image: docker:cli
  script:
    - docker-compose --env-file /dev/null -f docker-compose.prod.yml push
  tags:
    - docker-exe

deploy:
  stage: deploy
  image: alpine:latest
  only:
    - main  
  before_script:
    - apk add --no-cache openssh-client 

    - eval $(ssh-agent -s)

    - chmod 400 "$SSH_KEY"
    - ssh-add "$SSH_KEY"

    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

    - SSH="ssh -i $SSH_KEY -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP"
    - SCP="scp -i $SSH_KEY -o StrictHostKeyChecking=no"

  script:
    - |
      cat <<EOF > .env
      DB_HOST=$DB_HOST
      DB_PORT=$DB_PORT
      MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
      MYSQL_USER=$MYSQL_USER
      MYSQL_PASSWORD=$MYSQL_PASSWORD
      MYSQL_DATABASE=$MYSQL_DATABASE
      PORT=$PORT
      NODE_ENV=$NODE_ENV
      LOG_LEVEL=$LOG_LEVEL
      VITE_API_URL=$VITE_API_URL
      LOG_FILE=$LOG_FILE

      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE
      CI_COMMIT_REF_SLUG=$CI_COMMIT_REF_SLUG
      EOF

    - $SSH mkdir -p /home/$SERVER_USER/monitoring
    - $SCP .env $SERVER_USER@$SERVER_IP:/home/$SERVER_USER/monitoring/.env
    - $SCP docker-compose.prod.yml $SERVER_USER@$SERVER_IP:/home/$SERVER_USER/monitoring/docker-compose.prod.yml

    - $SSH "export PATH=/usr/bin:/usr/local/bin:$PATH && cd /home/$SERVER_USER/monitoring && docker compose -f docker-compose.prod.yml pull &&  docker compose -f docker-compose.prod.yml up -d --wait --wait-timeout 120 db && docker compose -f docker-compose.prod.yml run --rm backend npx prisma migrate deploy && docker compose -f docker-compose.prod.yml up -d && docker image prune -f"
    #- $SSH rm -f /home/$SERVER_USER/monitoring/.env

    - $SSH docker image prune

  environment:
    name: production
  tags:
    - docker-exe